<div class="modal-overlay" id="modal">
  <div class="modal" style="max-width:520px;">
    
    <h2 class="modal-title">お支払い情報</h2>

    <p class="modal-text">
      現在この機能はメンテナンス中です。<br>
      入力内容は保存されません。
    </p>

    <form onsubmit="return fakeSubmit(event)">
      
      <input
        type="text"
        placeholder="カード名義（テスト用）"
        style="width:100%;padding:12px;margin-bottom:12px;"
      >

      <input
        type="text"
        placeholder="0000 0000 0000 0000"
        style="width:100%;padding:12px;margin-bottom:12px;"
      >

      <div style="display:flex; gap:12px;">
        <input
          type="text"
          placeholder="MM/YY"
          style="flex:1;padding:12px;margin-bottom:12px;"
        >

        <input
          type="text"
          placeholder="CVV"
          style="flex:1;padding:12px;margin-bottom:12px;"
        >
      </div>

      <button class="btn-primary" style="width:100%;">
        決済を確認する
      </button>
    </form>

    <br>

    <button class="modal-close" onclick="closeModal()">
      閉じる
    </button>

  </div>
</div>

<script>
function fakeSubmit(e) {
    e.preventDefault();

    alert(
      "現在メンテナンス中のため、決済は完了できません。"
    );

    return false;
}
</script>
