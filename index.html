<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal" style="max-width:520px; text-align:left;">

    <h2 class="modal-title" style="text-align:center;">
      お支払い情報
    </h2>

    <p class="modal-text" style="text-align:center;">
      現在この機能はメンテナンス中です。<br>
      入力内容は保存されません。
    </p>

    <form onsubmit="return fakeSubmit(event)">

      <input
        type="text"
        placeholder="カード名義（テスト用）"
        style="
          width:100%;
          padding:12px;
          margin-bottom:12px;
          border:1px solid #ddd;
          font-size:14px;
          border-radius:4px;
        "
      >

      <input
        type="text"
        placeholder="0000 0000 0000 0000"
        style="
          width:100%;
          padding:12px;
          margin-bottom:12px;
          border:1px solid #ddd;
          font-size:14px;
          border-radius:4px;
        "
      >

      <div style="display:flex; gap:12px;">

        <input
          type="text"
          placeholder="MM/YY"
          style="
            flex:1;
            padding:12px;
            margin-bottom:12px;
            border:1px solid #ddd;
            font-size:14px;
            border-radius:4px;
          "
        >

        <input
          type="text"
          placeholder="CVV"
          style="
            flex:1;
            padding:12px;
            margin-bottom:12px;
            border:1px solid #ddd;
            font-size:14px;
            border-radius:4px;
          "
        >

      </div>

      <button
        class="btn-primary"
        style="
          width:100%;
          margin-top:8px;
          border:none;
        "
      >
        決済を確認する
      </button>

    </form>

    <button
      class="modal-close"
      onclick="closeModal()"
      style="
        width:100%;
        margin-top:16px;
      "
    >
      閉じる
    </button>

  </div>
</div>

<script>
  function showModal() {
    document.getElementById('modal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('active');
  }

  function fakeSubmit(e) {
    e.preventDefault();

    alert(
      "現在この機能はメンテナンス中のため、決済を完了できません。"
    );

    return false;
  }

  document
    .getElementById('modal')
    .addEventListener('click', function(e) {
      if (e.target === this) {
        closeModal();
      }
    });
</script>
