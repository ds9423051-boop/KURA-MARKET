<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>KURA MARKET</title>

<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f5f0e8;
  --dark:#1a1410;
  --accent:#c84b2f;
  --muted:#8a8070;
  --card:#fffdf8;
  --border:#e0d8c8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--dark);
  font-family:'DM Sans',sans-serif;
}

/* NAV */

nav{
  background:var(--card);
  border-bottom:1px solid var(--border);
  padding:0 48px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  height:64px;
  position:sticky;
  top:0;
  z-index:100;
}

.logo{
  font-family:'Shippori Mincho',serif;
  font-size:22px;
  font-weight:700;
  text-decoration:none;
  color:var(--dark);
}

.logo span{
  color:var(--accent);
}

.nav-links{
  display:flex;
  gap:28px;
  list-style:none;
}

.nav-links a{
  text-decoration:none;
  color:var(--muted);
  font-size:14px;
}

.nav-right button{
  background:var(--dark);
  color:#fff;
  border:none;
  padding:10px 20px;
  cursor:pointer;
}

/* HERO */

.hero{
  display:grid;
  grid-template-columns:1fr 1fr;
  min-height:500px;
}

.hero-text{
  padding:80px 64px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.hero-tag{
  color:var(--accent);
  margin-bottom:16px;
  font-size:12px;
}

.hero-title{
  font-family:'Shippori Mincho',serif;
  font-size:54px;
  margin-bottom:20px;
}

.hero-sub{
  color:var(--muted);
  line-height:1.7;
  margin-bottom:28px;
}

.btn-primary{
  background:var(--accent);
  color:#fff;
  border:none;
  padding:14px 28px;
  cursor:pointer;
  text-decoration:none;
}

.hero-image{
  background:#e8e0d0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:120px;
}

/* SECTION */

.section{
  padding:64px 48px;
}

.section-title{
  font-family:'Shippori Mincho',serif;
  font-size:30px;
  margin-bottom:10px;
}

.section-sub{
  color:var(--muted);
  margin-bottom:36px;
}

/* PRODUCTS */

.products-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

.product-card{
  background:var(--card);
  border:1px solid var(--border);
  overflow:hidden;
  transition:.2s;
}

.product-card:hover{
  transform:translateY(-4px);
}

.product-img{
  height:180px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:64px;
  background:#f0ebe0;
}

.product-body{
  padding:16px;
}

.product-tag{
  color:var(--accent);
  font-size:11px;
  margin-bottom:8px;
}

.product-name{
  font-size:15px;
  margin-bottom:10px;
}

.product-price{
  color:var(--accent);
  font-size:20px;
  margin-bottom:14px;
}

.btn-add,
.btn-detail{
  width:100%;
  border:none;
  padding:10px;
  cursor:pointer;
  margin-top:8px;
}

.btn-add{
  background:var(--dark);
  color:#fff;
}

.btn-detail{
  background:#ece5d8;
}

/* FOOTER */

footer{
  background:#12100e;
  color:#6a6050;
  padding:48px;
  margin-top:60px;
}

/* MODAL */

.modal-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  z-index:999;
  align-items:center;
  justify-content:center;
}

.modal-overlay.active{
  display:flex;
}

.modal{
  background:#fff;
  width:90%;
  max-width:520px;
  padding:32px;
  border-radius:8px;
}

.modal h2{
  margin-bottom:20px;
}

.modal input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border:1px solid #ccc;
}

.modal button{
  width:100%;
  padding:12px;
  border:none;
  cursor:pointer;
}

.close-btn{
  background:#ddd;
  margin-top:12px;
}

.buy-btn{
  background:var(--accent);
  color:#fff;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
  border-bottom:1px solid #eee;
  padding-bottom:10px;
}

.remove-btn{
  background:#b43b22;
  color:#fff;
  border:none;
  padding:6px 10px;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
  <a href="#" class="logo">KURA <span>MARKET</span></a>

  <ul class="nav-links">
    <li><a href="#">商品一覧</a></li>
    <li><a href="#">特集</a></li>
    <li><a href="#">ランキング</a></li>
    <li><a href="#">ブランド紹介</a></li>
    <li><a href="#">レビュー</a></li>
  </ul>

  <div class="nav-right">
    <button onclick="openCart()">
      🛒 カート (<span id="cart-count">0</span>)
    </button>
  </div>
</nav>

<div class="hero">
  <div class="hero-text">
    <div class="hero-tag">2026 SPRING COLLECTION</div>

    <h1 class="hero-title">
      暮らしに<br>上質を。
    </h1>

    <p class="hero-sub">
      日本各地のこだわりの商品を厳選した
      セレクトショップ。
    </p>

    <a href="#" class="btn-primary">
      商品を見る
    </a>
  </div>

  <div class="hero-image">
    🏮
  </div>
</div>

<div class="section">

  <h2 class="section-title">おすすめ商品</h2>
  <p class="section-sub">人気アイテムをチェック</p>

  <div class="products-grid">

    <!-- 1 -->
    <div class="product-card">
      <div class="product-img">🍵</div>

      <div class="product-body">
        <div class="product-tag">京都産</div>

        <div class="product-name">
          宇治抹茶 プレミアム缶
        </div>

        <div class="product-price">
          ¥3,280
        </div>

        <button class="btn-detail"
          onclick="showProductDetail(
          '宇治抹茶 プレミアム缶',
          '京都宇治産の高級抹茶。香り高く濃厚な味わい。',
          '¥3,280'
        )">
          商品詳細を見る
        </button>

        <button class="btn-add"
          onclick="addToCart('宇治抹茶 プレミアム缶',3280)">
          カートに追加
        </button>
      </div>
    </div>

    <!-- 2 -->
    <div class="product-card">
      <div class="product-img">🪴</div>

      <div class="product-body">
        <div class="product-tag">職人手作り</div>

        <div class="product-name">
          信楽焼 花瓶
        </div>

        <div class="product-price">
          ¥12,800
        </div>

        <button class="btn-detail"
          onclick="showProductDetail(
          '信楽焼 花瓶',
          '伝統技法で作られた和モダンな花瓶。',
          '¥12,800'
        )">
          商品詳細を見る
        </button>

        <button class="btn-add"
          onclick="addToCart('信楽焼 花瓶',12800)">
          カートに追加
        </button>
      </div>
    </div>

    <!-- 3 -->
    <div class="product-card">
      <div class="product-img">🧴</div>

      <div class="product-body">
        <div class="product-tag">無添加</div>

        <div class="product-name">
          馬油クリーム
        </div>

        <div class="product-price">
          ¥2,180
        </div>

        <button class="btn-detail"
          onclick="showProductDetail(
          '馬油クリーム',
          '北海道産馬油を使用した保湿クリーム。',
          '¥2,180'
        )">
          商品詳細を見る
        </button>

        <button class="btn-add"
          onclick="addToCart('馬油クリーム',2180)">
          カートに追加
        </button>
      </div>
    </div>

    <!-- 4 -->
    <div class="product-card">
      <div class="product-img">📚</div>

      <div class="product-body">
        <div class="product-tag">限定品</div>

        <div class="product-name">
          和紙ノート
        </div>

        <div class="product-price">
          ¥1,980
        </div>

        <button class="btn-detail"
          onclick="showProductDetail(
          '和紙ノート',
          '職人製の和紙を使った高級ノート。',
          '¥1,980'
        )">
          商品詳細を見る
        </button>

        <button class="btn-add"
          onclick="addToCart('和紙ノート',1980)">
          カートに追加
        </button>
      </div>
    </div>

  </div>
</div>

<footer>
  KURA MARKET
</footer>

<!-- 商品詳細モーダル -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <h2 id="detailTitle"></h2>

    <p id="detailText" style="margin-bottom:16px;"></p>

    <div id="detailPrice"
      style="font-size:22px;color:#c84b2f;margin-bottom:20px;">
    </div>

    <button class="close-btn"
      onclick="closeModal('detailModal')">
      閉じる
    </button>
  </div>
</div>

<!-- カート -->
<div class="modal-overlay" id="cartModal">
  <div class="modal">

    <h2>カート</h2>

    <div id="cart-items"></div>

    <button class="buy-btn"
      onclick="showCustomerForm()">
      購入手続きへ
    </button>

    <button class="close-btn"
      onclick="closeModal('cartModal')">
      閉じる
    </button>

  </div>
</div>

<!-- 個人情報 -->
<div class="modal-overlay" id="customerModal">
  <div class="modal">

    <h2>配送先情報</h2>

    <input type="text" placeholder="氏名">

    <input type="text" placeholder="住所">

    <input type="text" placeholder="電話番号">

    <button class="buy-btn"
      onclick="showPaymentForm()">
      決済情報入力へ
    </button>

    <button class="close-btn"
      onclick="closeModal('customerModal')">
      閉じる
    </button>

  </div>
</div>

<!-- 決済 -->
<div class="modal-overlay" id="paymentModal">
  <div class="modal">

    <h2>決済情報</h2>

    <input type="text" placeholder="カード名義">

    <input type="text" placeholder="0000 0000 0000 0000">

    <input type="text" placeholder="MM/YY">

    <input type="text" placeholder="CVV">

    <button class="buy-btn"
      onclick="completePurchase()">
      購入を完了
    </button>

    <button class="close-btn"
      onclick="closeModal('paymentModal')">
      閉じる
    </button>

  </div>
</div>

<script>

let cart = [];

function showProductDetail(title, text, price){
  document.getElementById('detailTitle').innerText = title;
  document.getElementById('detailText').innerText = text;
  document.getElementById('detailPrice').innerText = price;

  document.getElementById('detailModal')
    .classList.add('active');
}

function closeModal(id){
  document.getElementById(id)
    .classList.remove('active');
}

function addToCart(name, price){

  cart.push({
    name:name,
    price:price
  });

  updateCart();
}

function updateCart(){

  document.getElementById('cart-count')
    .innerText = cart.length;

  const cartItems =
    document.getElementById('cart-items');

  cartItems.innerHTML = '';

  if(cart.length === 0){
    cartItems.innerHTML = '<p>カートは空です。</p>';
    return;
  }

  cart.forEach((item,index)=>{

    cartItems.innerHTML += `
      <div class="cart-item">
        <div>
          <strong>${item.name}</strong><br>
          ¥${item.price.toLocaleString()}
        </div>

        <button class="remove-btn"
          onclick="removeFromCart(${index})">
          削除
        </button>
      </div>
    `;
  });
}

function removeFromCart(index){
  cart.splice(index,1);
  updateCart();
}

function openCart(){

  updateCart();

  document.getElementById('cartModal')
    .classList.add('active');
}

function showCustomerForm(){

  closeModal('cartModal');

  document.getElementById('customerModal')
    .classList.add('active');
}

function showPaymentForm(){

  closeModal('customerModal');

  document.getElementById('paymentModal')
    .classList.add('active');
}

function completePurchase(){

  alert('購入が完了しました。');

  cart = [];

  updateCart();

  closeModal('paymentModal');
}

document.querySelectorAll('.modal-overlay')
.forEach(modal=>{

  modal.addEventListener('click',function(e){

    if(e.target === this){
      this.classList.remove('active');
    }

  });

});

</script>

</body>
</html>
